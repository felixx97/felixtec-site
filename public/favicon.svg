<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0071e3" />
      <stop offset="100%" stop-color="#00d2ff" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g fill="url(#logo-grad)" filter="url(#glow)">
    <!-- F -->
    <rect x="5" y="20" width="13" height="60" />
    <rect x="18" y="20" width="39" height="15" />
    <rect x="18" y="46" width="22" height="13" />
    <!-- T -->
    <rect x="51" y="20" width="44" height="15" />
    <rect x="67" y="35" width="13" height="45" />
  </g>
</svg>
